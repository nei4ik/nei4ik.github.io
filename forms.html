<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <title> Palautekysely </title>
	<meta name="description" content="Lappeenranta">
	<link rel="stylesheet" href="styles/styleforms.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<main>
    <div class="formDiv">
    <h1> Kirjaston palautekysely </h1>
    <p> Kirjoita palautteesi. *-merkillä merkityt kentät ovat pakollisia. </p>
    <form>
        <label class="basicFieldsText" for="topic"> Aihe <span>*</span></label><br>
        <select id="topic" name="topic" class="select">
            <option class="grayText" value=""> Valitse palautteen aihe </option>
            <option value="kirjasto"> Kirjasto </option>
        </select><br>

        <label class="basicFieldsText" for="reason"> Palautteen luonne <span>*</span></label><br>
        <select id="reason" name="reason" class="select">
            <option class="grayText" value=""> Valitse palautteen luonne </option>
            <option value="">Kiitos</option>
            <option value="">Moite</option>
            <option value="">Kysymys</option>
            <option value="">Toimenpide-ehdotus</option>
        </select><br>

        <label class="basicFieldsText" for="upperText"> Palauteteksti (Ei yhteystietoja eikä arkaluonteista tietoa) * </label><br>
        <input class="inputField" type="text" id="upperText" name="upperText" placeholder=""><br>

        <input class="inputCheckbox" type="checkbox" name="canUpload" id="canUpload">
        <label class="checkboxText" for="canUpload"> Palautteen saa julkaista </label> <br>
        <label class="grayText" for="canUpload"> Julkaistu palaute on nähtävillä Hae ja selaa palautteita -sivulla ja RSS-syötteissä. Palautteen antajan yhteystietoja ei julkaista. </label><br>

        <label for="addfile"> Liitteet </label> <br>
        <label class="grayText" for="addfile"> Voit liittää palautteeseen yhden tai useampia liitetiedostoja, esimerkiksi kuvia havainnosta. </label> <br>
        <input type="file" id="addfile" name="addfile">

        <hr class="line">

        <h2>Anna yhteystiedot</h2>

        <label class="basicFieldsText" for="Fname">Etunimi</label><br>
        <input type="text" id="Fname" name="Fname"><br>
        <label class="basicFieldsText" for="Sname">Sukunimi</label><br>
        <input type="text" id="Sname" name="Sname"><br>
        <label class="basicFieldsText" for="mail">Sähköposti</label><br>
        <input type="text" id="mail" name="mail"><br>
        <label class="basicFieldsText" for="phoneNumber">Puhelin</label><br>
        <input type="text" id="phoneNumber" name="phoneNumber"><br>

        <input class="inputCheckbox" type="checkbox" name="submit" id="submit">
        <label class="checkboxText" for="submitButton"> Haluan vastauksen palautteeseen sähköpostiini</label>
        <br><button class="buttonStyle" type="submit" id="submitButton" name="submitButton">Lähetä</button>
    </form>
</div>
</main>

<footer>
    <a class="footerText" href="index.html">Takaisin etusivulle</a>
</footer>
</body>
</html>
